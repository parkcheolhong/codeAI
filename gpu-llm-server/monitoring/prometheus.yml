global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'vllm-server'
    static_configs:
      - targets: ['vllm-server:8000']
  
  - job_name: 'tgi-server'
    static_configs:
      - targets: ['tgi-server:80']
  
  - job_name: 'custom-llm-server'
    static_configs:
      - targets: ['custom-llm-server:8000']
  
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
